spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/idecttDb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
idectt.app.jwtSecret=${JWT_SECRET}
# 24 hours
idectt.app.jwtExpirationMs=86400000

# CORS Configuration
idectt.app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
idectt.app.frontendBaseUrl=${FRONTEND_BASE_URL:http://localhost:5173}
idectt.app.backendBaseUrl=${BACKEND_BASE_URL:http://localhost:8080}

# Email Verification Configuration
idectt.mail.enabled=${MAIL_ENABLED:false}
idectt.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Optional bootstrap admin (disable in production unless explicitly needed)
idectt.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
idectt.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
idectt.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
idectt.bootstrap.admin.fullName=${BOOTSTRAP_ADMIN_FULLNAME:IDEC-TT Admin}
idectt.bootstrap.admin.phone=${BOOTSTRAP_ADMIN_PHONE:}

# File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
